<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIBYAI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <h1 class="header-title">AIBYAI</h1>
      <button id="settings-btn" class="icon-btn" title="Settings">⚙</button>
    </header>

    <!-- Settings Panel (hidden by default) -->
    <div id="settings-panel" class="settings-panel hidden">
      <label>
        API URL
        <input type="url" id="api-url" placeholder="https://your-aibyai-instance.com" />
      </label>
      <label>
        API Key
        <input type="password" id="api-key" placeholder="Your API key" />
      </label>
      <label>
        Knowledge Base ID (optional)
        <input type="text" id="kb-id" placeholder="default" />
      </label>
      <div class="settings-actions">
        <button id="save-settings" class="btn btn-primary">Save</button>
        <button id="cancel-settings" class="btn">Cancel</button>
      </div>
    </div>

    <!-- Messages -->
    <div id="messages" class="messages"></div>

    <!-- Input -->
    <div class="input-area">
      <textarea id="input" placeholder="Ask anything..." rows="1"></textarea>
      <button id="send-btn" class="send-btn" disabled>▶</button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
