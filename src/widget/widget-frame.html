<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI by AI Widget</title>
  <style>
    :root {
      --bg: #0f0f14;
      --bg-secondary: #1a1a24;
      --bg-tertiary: #252535;
      --text: #e8e8f0;
      --text-muted: #9090a8;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --border: #2a2a3a;
      --error: #ef4444;
    }
    :root[data-theme="light"] {
      --bg: #ffffff;
      --bg-secondary: #f5f5f7;
      --bg-tertiary: #e8e8ec;
      --text: #1a1a2e;
      --text-muted: #6b6b80;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --border: #d4d4dc;
      --error: #dc2626;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
    }
    .header button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .header button:hover {
      background: var(--bg-tertiary);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 32px 12px;
      font-size: 13px;
      line-height: 1.5;
    }

    .message {
      margin-bottom: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user {
      background: var(--bg-tertiary);
      margin-left: 32px;
    }
    .message.assistant {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      margin-right: 32px;
    }
    .message .role {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 3px;
      font-weight: 600;
    }

    .error-msg {
      color: var(--error);
      font-size: 12px;
      padding: 6px 16px;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-area textarea {
      flex: 1;
      padding: 8px 10px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      resize: none;
      outline: none;
    }
    .input-area textarea:focus {
      border-color: var(--accent);
    }
    .input-area button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }
    .input-area button:hover:not(:disabled) {
      background: var(--accent-hover);
    }
    .input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .powered-by {
      text-align: center;
      padding: 6px;
      font-size: 10px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .powered-by a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>AI Council</h1>
    <button id="btn-close" title="Close">&times;</button>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state">
      Ask anything. Your questions are answered by the AI council.
    </div>
  </div>

  <div id="error-container"></div>

  <div class="input-area">
    <textarea id="input" placeholder="Ask something..." rows="1"></textarea>
    <button id="btn-send">Send</button>
  </div>

  <div class="powered-by">
    Powered by <a href="https://aibyai.com" target="_blank" rel="noopener">AI by AI</a>
  </div>

  <script>
    (function () {
      // ─── Parse URL params ──────────────────────────────────────────────────
      const params = new URLSearchParams(window.location.search);
      const apiKey = params.get("apiKey") || "";
      const theme = params.get("theme") || "auto";
      const origin = params.get("origin") || "";

      // Apply theme
      if (theme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
      } else if (theme === "auto") {
        if (window.matchMedia("(prefers-color-scheme: light)").matches) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      }

      // ─── State ───────────────────────────────────────────────────────────────
      const messages = [];
      let loading = false;

      const messagesEl = document.getElementById("messages");
      const inputEl = document.getElementById("input");
      const sendBtn = document.getElementById("btn-send");
      const errorEl = document.getElementById("error-container");

      // ─── Render messages ─────────────────────────────────────────────────────
      function renderMessages() {
        if (messages.length === 0) {
          messagesEl.innerHTML = '<div class="empty-state">Ask anything. Your questions are answered by the AI council.</div>';
          return;
        }
        messagesEl.innerHTML = messages.map(function (m) {
          var cls = m.role === "user" ? "user" : "assistant";
          var label = m.role === "user" ? "You" : "Council";
          var escaped = m.content.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
          return '<div class="message ' + cls + '"><div class="role">' + label + '</div>' + escaped + '</div>';
        }).join("");
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      // ─── Send message ───────────────────────────────────────────────────────
      async function send() {
        var text = inputEl.value.trim();
        if (!text || loading) return;

        messages.push({ role: "user", content: text });
        inputEl.value = "";
        loading = true;
        sendBtn.disabled = true;
        errorEl.innerHTML = "";
        renderMessages();

        try {
          // Determine API base from the iframe's own origin
          var apiBase = window.location.origin;
          var res = await fetch(apiBase + "/api/surfaces/widget-ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ apiKey: apiKey, message: text }),
          });

          if (!res.ok) {
            var err = await res.json().catch(function () { return {}; });
            throw new Error(err.error || "HTTP " + res.status);
          }

          var data = await res.json();
          messages.push({ role: "assistant", content: data.response || "No response." });
        } catch (e) {
          errorEl.innerHTML = '<div class="error-msg">' + (e.message || "Error") + '</div>';
        } finally {
          loading = false;
          sendBtn.disabled = false;
          renderMessages();
        }
      }

      // ─── Events ─────────────────────────────────────────────────────────────
      sendBtn.addEventListener("click", send);
      inputEl.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });

      document.getElementById("btn-close").addEventListener("click", function () {
        window.parent.postMessage({ type: "aibyai-widget-close" }, "*");
      });
    })();
  </script>
</body>
</html>
