apiVersion: apps/v1
kind: Deployment
metadata:
  name: aibyai-frontend
  namespace: aibyai
  labels:
    app: aibyai-frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aibyai-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: aibyai-frontend
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: aibyai
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: frontend
          image: ghcr.io/yash-awasthi/aibyai/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4173
              protocol: TCP
          env:
            - name: VITE_API_URL
              value: "http://aibyai-backend:3000"
          livenessProbe:
            httpGet:
              path: /
              port: 4173
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 4173
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
