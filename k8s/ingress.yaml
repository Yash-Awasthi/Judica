apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: judica
  namespace: judica
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    # Uncomment for TLS with cert-manager:
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # Uncomment and fill for TLS:
  # tls:
  #   - hosts:
  #       - judica.example.com
  #     secretName: judica-tls
  rules:
    - host: judica.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: judica-backend
                port:
                  number: 3000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: judica-backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: judica-frontend
                port:
                  number: 4173
