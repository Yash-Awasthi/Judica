# secrets-template.yaml — Copy this file to secrets.yaml, fill in real values, then apply.
# WARNING: Never commit secrets.yaml to version control.
# Use: kubectl apply -f k8s/secrets.yaml -n judica
#
# For production, consider using:
#   - Kubernetes External Secrets with a secrets manager (Vault, AWS Secrets Manager, etc.)
#   - Sealed Secrets (Bitnami)
#   - SOPS encrypted secrets
#
# Generate strong random values:
#   JWT_SECRET:            openssl rand -hex 64
#   MASTER_ENCRYPTION_KEY: openssl rand -hex 32
#   POSTGRES_PASSWORD:     openssl rand -hex 32
#   REDIS_PASSWORD:        openssl rand -hex 32

apiVersion: v1
kind: Secret
metadata:
  name: judica-secrets
  namespace: judica
type: Opaque
stringData:
  # PostgreSQL credentials
  POSTGRES_USER: "council"
  POSTGRES_PASSWORD: "CHANGE_ME_strong_random_password"
  POSTGRES_DB: "councildb"

  # Redis credentials
  REDIS_PASSWORD: "CHANGE_ME_strong_random_password"

  # Application secrets
  DATABASE_URL: "postgresql://council:CHANGE_ME_strong_random_password@postgres:5432/councildb"
  REDIS_URL: "redis://:CHANGE_ME_strong_random_password@redis:6379"
  JWT_SECRET: "CHANGE_ME_generate_with_openssl_rand_hex_64"
  MASTER_ENCRYPTION_KEY: "CHANGE_ME_generate_with_openssl_rand_hex_32"
