apiVersion: v1
kind: Service
metadata:
  name: {{ include "aibyai.fullname" . }}-backend
  labels:
    {{- include "aibyai.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.service.backend.type }}
  ports:
    - port: {{ .Values.service.backend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "aibyai.backend.selectorLabels" . | nindent 4 }}
