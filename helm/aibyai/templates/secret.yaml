apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aibyai.fullname" . }}-secrets
  labels:
    {{- include "aibyai.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- if .Values.postgresql.enabled }}
  POSTGRESQL_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  {{- end }}
  {{- if .Values.redis.enabled }}
  REDIS_PASSWORD: {{ .Values.redis.auth.password | quote }}
  {{- end }}
