apiVersion: v1
kind: Service
metadata:
  name: {{ include "aibyai.fullname" . }}-frontend
  labels:
    {{- include "aibyai.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.service.frontend.type }}
  ports:
    - port: {{ .Values.service.frontend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "aibyai.frontend.selectorLabels" . | nindent 4 }}
