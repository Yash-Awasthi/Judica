apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "judica.fullname" . }}-config
  labels:
    {{- include "judica.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  PORT: {{ .Values.backend.port | quote }}
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
