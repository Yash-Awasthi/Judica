<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Council</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }
    .sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100vh; background: #141414; border-right: 1px solid #222; padding: 1.5rem 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0; }
    .main { margin-left: 260px; padding: 2rem; max-width: 860px; }
    h1 { font-size: 1.4rem; color: #fff; margin-bottom: 0.25rem; }
    .sub { font-size: 0.8rem; color: #555; margin-bottom: 1rem; }
    .section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: #555; margin-bottom: 0.75rem; margin-top: 1rem; }
    input, select, textarea { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 0.6rem 0.75rem; color: #e0e0e0; font-size: 0.875rem; margin-bottom: 0.5rem; }
    input::placeholder, textarea::placeholder { color: #444; }
    button { border-radius: 6px; padding: 0.6rem 1rem; font-size: 0.875rem; cursor: pointer; font-weight: 500; border: none; }
    .btn-primary { background: #4f46e5; color: #fff; width: 100%; }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }
    .btn-sm { background: #1e1e1e; color: #aaa; border: 1px solid #2a2a2a; font-size: 0.75rem; padding: 0.35rem 0.65rem; }
    .btn-sm:hover { background: #2a2a2a; }
    .btn-danger { background: transparent; color: #f87171; border: 1px solid #3a2020; font-size: 0.75rem; padding: 0.3rem 0.6rem; border-radius: 4px; }
    .btn-danger:hover { background: #2a1010; }
    .btn-ghost { background: transparent; color: #888; border: 1px solid #222; font-size: 0.75rem; padding: 0.35rem 0.65rem; }
    .btn-ghost:hover { color: #e0e0e0; border-color: #444; }
    .member-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 0.75rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
    .member-card .info { font-size: 0.8rem; flex: 1; min-width: 0; }
    .member-card .name { color: #e0e0e0; font-weight: 500; }
    .member-card .model { color: #555; font-size: 0.72rem; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .master-badge { font-size: 0.65rem; background: #312e81; color: #a5b4fc; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
    .chat-area { margin-top: 2rem; }
    textarea#question { min-height: 80px; resize: vertical; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tab { background: transparent; border: 1px solid #2a2a2a; color: #888; border-radius: 6px; padding: 0.4rem 1rem; font-size: 0.8rem; cursor: pointer; }
    .tab.active { background: #1e1e1e; color: #e0e0e0; border-color: #444; }
    .verdict-box { background: #1a1a1a; border: 1px solid #312e81; border-radius: 10px; padding: 1.25rem; line-height: 1.75; font-size: 0.95rem; white-space: pre-wrap; }
    .opinion-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
    .opinion-card .oname { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: #666; margin-bottom: 0.5rem; }
    .opinion-card .otext { font-size: 0.88rem; line-height: 1.7; white-space: pre-wrap; }
    .history-item { padding: 0.6rem 0.5rem; border-bottom: 1px solid #1e1e1e; cursor: pointer; font-size: 0.8rem; color: #888; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .history-item:hover { color: #e0e0e0; background: #1a1a1a; border-radius: 4px; }
    .history-item .hq { color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .history-item .ht { font-size: 0.7rem; color: #444; flex-shrink: 0; }
    .history-del { background: transparent; border: none; color: #3a2020; font-size: 0.75rem; cursor: pointer; padding: 2px 4px; border-radius: 3px; }
    .history-del:hover { color: #f87171; background: #2a1010; }
    .divider { border: none; border-top: 1px solid #1e1e1e; margin: 0.75rem 0; }
    .add-form { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 1rem; margin-top: 0.75rem; }
    /* Auth modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: #141414; border: 1px solid #2a2a2a; border-radius: 12px; padding: 2rem; width: 360px; }
    .modal h2 { font-size: 1.1rem; color: #fff; margin-bottom: 0.25rem; }
    .modal .msub { font-size: 0.8rem; color: #555; margin-bottom: 1.5rem; }
    .modal-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; }
    .modal-tab { flex: 1; background: transparent; border: 1px solid #2a2a2a; color: #888; border-radius: 6px; padding: 0.4rem; font-size: 0.8rem; cursor: pointer; }
    .modal-tab.active { background: #1e1e1e; color: #e0e0e0; border-color: #444; }
    .auth-error { color: #f87171; font-size: 0.8rem; margin-bottom: 0.75rem; }
    /* User bar */
    .user-bar { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0.75rem; background: #1a1a1a; border-radius: 6px; margin-bottom: 0.5rem; }
    .user-bar .uname { font-size: 0.8rem; color: #ccc; }
    .save-indicator { font-size: 0.7rem; color: #555; text-align: center; margin-top: 0.25rem; }
    .streaming-dot { color: #4f46e5; animation: pulse 1s infinite; font-size: 0.6rem; vertical-align: middle; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
  </style>
</head>
<body>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <h2>🏛️ AI Council</h2>
    <p class="msub">Sign in to save your council and chat history</p>
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchAuthTab('login', this)">Login</button>
      <button class="modal-tab" onclick="switchAuthTab('register', this)">Register</button>
    </div>
    <div id="authError" class="auth-error" style="display:none"></div>
    <input id="authUsername" placeholder="Username" autocomplete="username" />
    <input id="authPassword" placeholder="Password" type="password" autocomplete="current-password" />
    <button class="btn-primary" onclick="submitAuth()" style="margin-bottom:0.75rem">Continue</button>
    <button class="btn-ghost" style="width:100%" onclick="skipAuth()">Skip — use without account</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <h1>🏛️ AI Council</h1>
  <p class="sub">Multi-model verdict engine</p>

  <!-- User bar (shown when logged in) -->
  <div id="userBar" style="display:none">
    <div class="user-bar">
      <span class="uname" id="usernameDisplay"></span>
      <button class="btn-ghost" onclick="logout()">Logout</button>
    </div>
    <div class="save-indicator" id="saveIndicator"></div>
  </div>

  <div class="section-title">Council Members</div>
  <div id="memberList"></div>
  <button class="btn-sm" style="width:100%;margin-top:0.5rem" onclick="toggleAddForm()">+ Add member</button>

  <div class="add-form" id="addForm" style="display:none">
    <input id="mName" placeholder="Display name (e.g. GPT-4o)" />
    <select id="mType">
      <option value="openai-compat">OpenAI / NVIDIA / Groq / OpenRouter</option>
      <option value="anthropic">Anthropic (Claude)</option>
      <option value="google">Google (Gemini)</option>
    </select>
    <input id="mKey" placeholder="API key" type="password" />
    <input id="mModel" placeholder="Model ID (e.g. gpt-4o)" />
    <input id="mBase" placeholder="Base URL (leave blank for default)" />
    <div style="display:flex;gap:0.5rem;margin-top:0.25rem">
      <button class="btn-sm" style="flex:1" onclick="addMember()">Add</button>
      <button class="btn-sm" style="flex:1" onclick="toggleAddForm()">Cancel</button>
    </div>
  </div>

  <hr class="divider" />
  <div class="section-title">History</div>
  <div id="historyList"></div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="section-title" style="margin-bottom:0.5rem">Question</div>
  <textarea id="question" placeholder="Ask the council anything..."></textarea>
  <button class="btn-primary" id="askBtn" onclick="ask()">Ask the Council</button>

  <div class="chat-area" id="chatArea" style="display:none">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('verdict', this)">Verdict</button>
      <button class="tab" onclick="switchTab('opinions', this)">Opinions</button>
    </div>
    <div id="tab-verdict" style="display:block">
      <div class="verdict-box" id="verdictText"></div>
    </div>
    <div id="tab-opinions" style="display:none">
      <div id="opinionsList"></div>
    </div>
  </div>
</div>

<script>
  // ── State ────────────────────────────────────────────
  let members = [
    { name: "Kimi K2.5", type: "openai-compat", apiKey: "", model: "moonshotai/kimi-k2.5", baseUrl: "https://integrate.api.nvidia.com/v1" },
    { name: "GLM-5",     type: "openai-compat", apiKey: "", model: "z-ai/glm5",             baseUrl: "https://integrate.api.nvidia.com/v1" },
    { name: "MiniMax",   type: "openai-compat", apiKey: "", model: "minimaxai/minimax-m2.5", baseUrl: "https://integrate.api.nvidia.com/v1" },
  ];
  let masterIndex = 0;
  let token = localStorage.getItem("token") || null;
  let username = localStorage.getItem("username") || null;
  let authMode = "login";

  // ── Auth ─────────────────────────────────────────────
  function switchAuthTab(mode, el) {
    authMode = mode;
    document.querySelectorAll(".modal-tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    document.getElementById("authError").style.display = "none";
  }

  async function submitAuth() {
    const u = document.getElementById("authUsername").value.trim();
    const p = document.getElementById("authPassword").value.trim();
    const errEl = document.getElementById("authError");
    if (!u || !p) { showAuthError("Both fields required"); return; }

    const res = await fetch(`/auth/${authMode}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: u, password: p }),
    });
    const data = await res.json();
    if (data.error) { showAuthError(data.error); return; }

    token = data.token;
    username = data.username;
    localStorage.setItem("token", token);
    localStorage.setItem("username", username);
    closeModal();
    await loadConfig();
    loadHistory();
  }

  function showAuthError(msg) {
    const el = document.getElementById("authError");
    el.textContent = msg;
    el.style.display = "block";
  }

  function skipAuth() {
    closeModal();
    loadHistory();
  }

  function closeModal() {
    document.getElementById("authModal").style.display = "none";
    document.getElementById("userBar").style.display = token ? "block" : "none";
    if (username) document.getElementById("usernameDisplay").textContent = username;
  }

  function logout() {
    token = null; username = null;
    localStorage.removeItem("token");
    localStorage.removeItem("username");
    document.getElementById("userBar").style.display = "none";
    document.getElementById("authModal").style.display = "flex";
  }

  // ── Config save/load ──────────────────────────────────
  async function saveConfig() {
    if (!token) return;
    await fetch("/auth/config", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
      body: JSON.stringify({ config: { members, masterIndex } }),
    });
    const ind = document.getElementById("saveIndicator");
    ind.textContent = "Council saved ✓";
    setTimeout(() => ind.textContent = "", 2000);
  }

  async function loadConfig() {
    if (!token) return;
    const res = await fetch("/auth/config", {
      headers: { "Authorization": `Bearer ${token}` }
    });
    const data = await res.json();
    if (data && data.members) {
      members = data.members;
      masterIndex = data.masterIndex ?? 0;
      renderMembers();
    }
  }

  // ── Members ───────────────────────────────────────────
  function renderMembers() {
    document.getElementById("memberList").innerHTML = members.map((m, i) => `
      <div class="member-card">
        <div class="info">
          <div class="name">${m.name}${i === masterIndex ? '<span class="master-badge">MASTER</span>' : ''}</div>
          <div class="model">${m.model}</div>
          <input type="password" placeholder="API key" value="${m.apiKey}"
            oninput="members[${i}].apiKey = this.value; debounceSave()"
            style="margin-top:4px;margin-bottom:0;font-size:0.72rem;padding:0.3rem 0.5rem" />
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;margin-left:8px;flex-shrink:0">
          <button class="btn-sm" onclick="setMaster(${i})">Master</button>
          <button class="btn-danger" onclick="removeMember(${i})">✕</button>
        </div>
      </div>
    `).join("");
  }

  let saveTimer = null;
  function debounceSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveConfig, 1500);
  }

  function setMaster(i) { masterIndex = i; renderMembers(); saveConfig(); }
  function removeMember(i) {
    members.splice(i, 1);
    if (masterIndex >= members.length) masterIndex = 0;
    renderMembers();
    saveConfig();
  }

  function toggleAddForm() {
    const f = document.getElementById("addForm");
    f.style.display = f.style.display === "none" ? "block" : "none";
  }

  function addMember() {
    const name  = document.getElementById("mName").value.trim();
    const type  = document.getElementById("mType").value;
    const key   = document.getElementById("mKey").value.trim();
    const model = document.getElementById("mModel").value.trim();
    const base  = document.getElementById("mBase").value.trim();
    if (!name || !key || !model) { alert("Name, API key, and model are required."); return; }
    members.push({ name, type, apiKey: key, model, baseUrl: base });
    renderMembers();
    saveConfig();
    toggleAddForm();
    ["mName","mKey","mModel","mBase"].forEach(id => document.getElementById(id).value = "");
  }

  // ── Tabs ──────────────────────────────────────────────
  function switchTab(tab, el) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    document.getElementById("tab-verdict").style.display  = tab === "verdict"  ? "block" : "none";
    document.getElementById("tab-opinions").style.display = tab === "opinions" ? "block" : "none";
  }

  // ── Ask ───────────────────────────────────────────────

async function ask() {
    const question = document.getElementById("question").value.trim();
    if (!question) return;
    if (!members.length) { alert("Add at least one council member."); return; }
    if (members.some(m => !m.apiKey)) { alert("All members need an API key."); return; }

    const btn = document.getElementById("askBtn");
    btn.disabled = true;
    btn.textContent = "Consulting council...";

    document.getElementById("verdictText").textContent = "";
    document.getElementById("opinionsList").innerHTML = members.map(m => `
      <div class="opinion-card" id="opinion-${m.name.replace(/\s+/g, '-')}">
        <div class="oname">${m.name} <span class="streaming-dot">●</span></div>
        <div class="otext" id="otext-${m.name.replace(/\s+/g, '-')}"></div>
      </div>
    `).join("");
    document.getElementById("chatArea").style.display = "block";
    switchTab("opinions", document.querySelectorAll(".tab")[1]);

    try {
      const res = await fetch("/stream", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...(token ? { "Authorization": `Bearer ${token}` } : {}),
        },
        body: JSON.stringify({ question, members, master: members[masterIndex] }),
      });

      if (!res.ok) {
        const err = await res.json();
        alert(err.error ?? "Request failed");
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let currentEvent = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop() ?? "";

        for (const line of lines) {
          if (line.startsWith("event: ")) {
            currentEvent = line.slice(7).trim();
          } else if (line.startsWith("data: ")) {
            try {
              const data = JSON.parse(line.slice(6));
              handleStreamEvent(currentEvent, data);
            } catch {}
            currentEvent = "";
          }
        }
      }
    } catch(e) {
      alert("Server error. Is the server running?");
    } finally {
      btn.disabled = false;
      btn.textContent = "Ask the Council";
      loadHistory();
    }
  }

function handleStreamEvent(event, data) {
  if (event === "member_chunk") {
    const id = "otext-" + data.name.replace(/\s+/g, '-');
    const el = document.getElementById(id);
    if (el) {
      el.textContent += data.chunk;
      el.textContent = el.textContent.replace(/<think>[\s\S]*?<\/think>/g, "").replace(/<think>[\s\S]*/g, "").trim();
    }
  }
  if (event === "member_done") {
    const cardId = "opinion-" + data.name.replace(/\s+/g, '-');
    const card = document.getElementById(cardId);
    if (card) {
      const dot = card.querySelector(".streaming-dot");
      if (dot) dot.remove();
    }
  }
  if (event === "master_chunk") {
    const el = document.getElementById("verdictText");
    if (el) {
      el.textContent += data.chunk;
      el.textContent = el.textContent.replace(/<think>[\s\S]*?<\/think>/g, "").replace(/<think>[\s\S]*/g, "").trim();
    }
  }
  if (event === "done") {
    switchTab("verdict", document.querySelector(".tab"));
  }
}

  // ── History ───────────────────────────────────────────
  async function loadHistory() {
    const res = await fetch("/history", {
      headers: token ? { "Authorization": `Bearer ${token}` } : {},
    });
    const rows = await res.json();
    document.getElementById("historyList").innerHTML = rows.length
      ? rows.map(r => `
        <div class="history-item">
          <span class="hq" onclick="loadChat(${r.id})">${r.question}</span>
          <span class="ht">${new Date(r.created_at).toLocaleDateString()}</span>
          ${token ? `<button class="history-del" onclick="deleteChat(${r.id})">✕</button>` : ""}
        </div>
      `).join("")
      : '<div style="color:#444;font-size:0.75rem;padding:0.5rem">No history yet</div>';
  }

  async function loadChat(id) {
    const res = await fetch("/history", {
      headers: token ? { "Authorization": `Bearer ${token}` } : {},
    });
    const rows = await res.json();
    const row = rows.find(r => r.id === id);
    if (!row) return;
    document.getElementById("question").value = row.question;
    document.getElementById("verdictText").textContent = row.verdict;
    const opinions = typeof row.opinions === "string" ? JSON.parse(row.opinions) : row.opinions;
    document.getElementById("opinionsList").innerHTML = opinions.map(o => `
      <div class="opinion-card">
        <div class="oname">${o.name}</div>
        <div class="otext">${o.answer}</div>
      </div>
    `).join("");
    document.getElementById("chatArea").style.display = "block";
  }

  async function deleteChat(id) {
    if (!token) return;
    await fetch(`/history/${id}`, {
      method: "DELETE",
      headers: { "Authorization": `Bearer ${token}` },
    });
    loadHistory();
  }

  // ── Init ──────────────────────────────────────────────
  async function init() {
    if (token) {
      closeModal();
      await loadConfig();
    }
    renderMembers();
    loadHistory();
  }

  init();
</script>
</body>
</html>
